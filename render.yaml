services:
  - type: web
    name: fintrack-backend
    env: node
    region: ohio
    branch: main
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase: fintrack-db
      - key: FRONTEND_URL
        value: https://fintrack.onrender.com
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_USER
        value: khamidollarasul@gmail.com
      - key: EMAIL_PASSWORD
        value: ndmn fcux xytz demg

  - type: database
    name: fintrack-db
    region: ohio
    plan: free
    ipAllowList: []
    postgresVersion: 15
    
  - type: web
    name: fintrack-frontend
    env: static
    region: ohio
    branch: main
    buildCommand: |
      mkdir -p public
      cp *.html style.css
      mkdir -p public/js
      cp js/*.js public/js/
    staticPublishPath: public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: fintrack-db
    region: ohio
    plan: free
    postgresVersion: 15