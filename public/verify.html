<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account - FinTrack</title>
    <link rel="stylesheet" href="./css/verify.css">
</head>
<body>
    <div class="auth-container">
        <h1>Verify Your Account</h1>
        <div id="verification-message" style="display: none;"></div>
        <form id="verification-form">
            <div class="form-group">
                <label for="code">Verification Code:</label>
                <input type="text" id="code" maxlength="6" pattern="[0-9]{6}" required>
                <small>Enter the 6-digit code sent to your email</small>
            </div>
            <button type="submit">Verify Account</button>
            <button type="button" id="resend-code" class="secondary-button">Resend Code</button>
        </form>
        <p>Already verified? <a href="login.html">Login</a></p>
    </div>
    <script src="js/verify.js"></script>
</body>
</html>
