<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack - Email Verification</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #7209b7;
            --light: #f8f9fa;
            --dark: #212529;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --text-light: #6c757d;
            --border: #dee2e6;
            --card-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--dark);
        }
        
        .auth-container {
            width: 90%;
            max-width: 450px;
            background-color: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }
        
        .auth-header {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        .auth-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        .auth-header p {
            opacity: 0.9;
            font-size: 1rem;
        }
        
        .auth-body {
            padding: 2rem;
        }
        
        .auth-message {
            margin-bottom: 1.5rem;
            padding: 0.75rem;
            border-radius: 4px;
            text-align: center;
            display: none;
        }
        
        .auth-message.error {
            background-color: rgba(231, 76, 60, 0.1);
            color: var(--danger);
            border: 1px solid rgba(231, 76, 60, 0.2);
            display: block;
        }
        
        .auth-message.success {
            background-color: rgba(46, 204, 113, 0.1);
            color: var(--success);
            border: 1px solid rgba(46, 204, 113, 0.2);
            display: block;
        }
        
        .verification-text {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            color: var(--dark);
            line-height: 1.6;
        }
        
        .verification-email {
            display: block;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary-dark);
            margin: 0.5rem 0;
        }
        
        .pulse {
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                opacity: 1;
            }
        }
        
        .code-inputs {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .code-input {
            width: 3rem;
            height: 3.5rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: var(--transition);
        }
        
        .code-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }
        
        .help-text {
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        
        .form-actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .verify-btn {
            width: 100%;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .verify-btn:hover {
            background: linear-gradient(to right, var(--primary-dark), var(--primary-dark));
            transform: translateY(-1px);
        }
        
        .resend-btn {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .resend-btn:hover {
            background-color: rgba(67, 97, 238, 0.05);
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-light);
        }
        
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .auth-footer a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
        
        .timer {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        
        .loader {
            display: inline-block;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 0.5rem;
            vertical-align: middle;
            display: none;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>FinTrack</h1>
            <p>Email Verification</p>
        </div>
        
        <div class="auth-body">
            <div id="auth-message" class="auth-message"></div>
            
            <div class="verification-text">
                We've sent a verification code to:<br>
                <span class="verification-email pulse" id="user-email">user@example.com</span>
                Please enter the 6-digit code below
            </div>
            
            <form id="verification-form">
                <div class="code-inputs">
                    <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                </div>
                
                <div class="help-text">
                    Didn't receive the code? Check your spam folder.
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="verify-btn" id="verify-button">
                        Verify Email <span class="loader" id="verify-loader"></span>
                    </button>
                    <button type="button" class="resend-btn" id="resend-button">
                        Resend Code
                    </button>
                </div>
            </form>
            
            <div class="auth-footer">
                <p>Return to <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const verificationForm = document.getElementById('verification-form');
            const authMessage = document.getElementById('auth-message');
            const verifyButton = document.getElementById('verify-button');
            const resendButton = document.getElementById('resend-button');
            const verifyLoader = document.getElementById('verify-loader');
            const timerEl = document.getElementById('timer');
            const userEmailEl = document.getElementById('user-email');
            const codeInputs = document.querySelectorAll('.code-input');
            
            // Get email from localStorage (set during signup)
            const email = localStorage.getItem('pendingVerification');
            if (email) {
                userEmailEl.textContent = email;
            } else {
                // If no email in storage, redirect to signup
                //window.location.href = '/signup.html';
            }
            
            // Auto-focus to next input when a digit is entered
            codeInputs.forEach((input, index) => {
                input.addEventListener('keyup', (e) => {
                    // Move to next input if current is filled
                    if (input.value && index < codeInputs.length - 1) {
                        codeInputs[index + 1].focus();
                    }
                    
                    // Handle backspace - move to previous input
                    if (e.key === 'Backspace' && index > 0 && !input.value) {
                        codeInputs[index - 1].focus();
                    }
                });
                
                // Handle paste event for the entire code
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pasteData = e.clipboardData.getData('text');
                    
                    // If pasted content is a 6-digit number
                    if (/^\d{6}$/.test(pasteData)) {
                        // Fill all inputs with the digits
                        [...pasteData].forEach((digit, i) => {
                            if (i < codeInputs.length) {
                                codeInputs[i].value = digit;
                            }
                        });
                        
                        // Focus on the last input
                        codeInputs[codeInputs.length - 1].focus();
                    }
                });
            });
            
            // No countdown timer needed
            
            // Form submission
            verificationForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Combine the code inputs into a single string
                const code = Array.from(codeInputs).map(input => input.value).join('');
                
                // Ensure we have a 6-digit code
                if (code.length !== 6 || !/^\d{6}$/.test(code)) {
                    authMessage.textContent = 'Please enter a valid 6-digit code';
                    authMessage.className = 'auth-message error';
                    return;
                }
                
                // Show loader
                verifyButton.disabled = true;
                verifyLoader.style.display = 'inline-block';
                
                try {
                    const response = await fetch('/api/auth/verify', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, code })
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error || 'Verification failed');
                    }
                    
                    // Show success message
                    authMessage.textContent = 'Email verified successfully! Redirecting to login...';
                    authMessage.className = 'auth-message success';
                    
                    // Clear pending verification
                    localStorage.removeItem('pendingVerification');
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                    
                } catch (error) {
                    // Display error message
                    authMessage.textContent = error.message;
                    authMessage.className = 'auth-message error';
                    
                    // Re-enable button and hide loader
                    verifyButton.disabled = false;
                    verifyLoader.style.display = 'none';
                }
            });
            
            // Resend code button
            resendButton.addEventListener('click', async () => {
                if (resendButton.disabled) return;
                
                // No need to disable button
                
                try {
                    const response = await fetch('/api/auth/resend-code', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email })
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error || 'Failed to resend code');
                    }
                    
                    // Show success message
                    authMessage.textContent = 'Verification code resent successfully';
                    authMessage.className = 'auth-message success';
                    
                    // No timer to reset
                    
                } catch (error) {
                    // Display error message
                    authMessage.textContent = error.message;
                    authMessage.className = 'auth-message error';
                    // Button already enabled
                }
            });
            
            // Focus on first input by default
            codeInputs[0].focus();
        });
    </script>
</body>
</html>
