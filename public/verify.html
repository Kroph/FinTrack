<!-- verify.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account - FinTrack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h1>Verify Your Account</h1>
        <div id="verification-message" style="display: none;"></div>
        <form id="verification-form">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="code">Verification Code:</label>
                <input type="text" id="code" maxlength="6" pattern="[0-9]{6}" required>
                <small>Enter the 6-digit code sent to your email</small>
            </div>
            <button type="submit">Verify Account</button>
        </form>
        <button id="resend-code" class="secondary-button">Resend Code</button>
        <p>Already verified? <a href="login.html">Login</a></p>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get email from URL parameters if available
            const urlParams = new URLSearchParams(window.location.search);
            const emailFromURL = urlParams.get('email');
            if (emailFromURL) {
                const emailInput = document.getElementById('email');
                emailInput.value = emailFromURL;
                emailInput.readOnly = true; // Make it read-only since we know it's correct
            }
            const verificationForm = document.getElementById('verification-form');
            const resendButton = document.getElementById('resend-code');
            const messageDiv = document.getElementById('verification-message');

            function showMessage(message, type = 'info') {
                messageDiv.textContent = message;
                messageDiv.style.display = 'block';
                messageDiv.className = `alert ${type}`;
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }

            verificationForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const code = document.getElementById('code').value;

                try {
                    const response = await fetch('/api/auth/verify', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, code })
                    });

                    const data = await response.json();

                    if (data.success) {
                        showMessage('Account verified successfully!', 'success');
                        setTimeout(() => {
                            window.location.href = '/login.html';
                        }, 2000);
                    } else {
                        showMessage(data.error, 'error');
                    }
                } catch (error) {
                    showMessage('Error verifying account', 'error');
                }
            });

            resendButton.addEventListener('click', async () => {
                const email = document.getElementById('email').value;
                if (!email) {
                    showMessage('Please enter your email first', 'error');
                    return;
                }

                try {
                    const response = await fetch('/api/auth/resend-code', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email })
                    });

                    const data = await response.json();

                    if (data.success) {
                        showMessage('New verification code sent!', 'success');
                    } else {
                        showMessage(data.error, 'error');
                    }
                } catch (error) {
                    showMessage('Error sending verification code', 'error');
                }
            });
        });
    </script>
</body>
</html>
