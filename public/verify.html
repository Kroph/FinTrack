<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack - Email Verification</title>
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>
    <div class="auth-container">
        <h1>Email Verification</h1>
        <div id="verification-message" class="message"></div>
        <form id="verification-form">
            <div class="form-group">
                <label for="verification-code">Enter Verification Code</label>
                <div class="code-inputs">
                    <input type="text" class="code-input" maxlength="1" required>
                    <input type="text" class="code-input" maxlength="1" required>
                    <input type="text" class="code-input" maxlength="1" required>
                    <input type="text" class="code-input" maxlength="1" required>
                    <input type="text" class="code-input" maxlength="1" required>
                    <input type="text" class="code-input" maxlength="1" required>
                </div>
                <div class="help-text">Enter the 6-digit code sent to your email</div>
            </div>
            <div class="form-actions">
                <button type="submit" class="verify-btn">Verify Email</button>
                <button type="button" class="resend-btn" id="resend-button">Resend Code</button>
            </div>
        </form>
    </div>
    <script src="js/verify.js"></script>
</body>
</html>
